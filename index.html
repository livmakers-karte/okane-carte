<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-ancestors 'none';">
<meta name="referrer" content="strict-origin-when-cross-origin">
<!-- 公開前は noindex（ポータルは準備中）。 -->
<meta name="robots" content="noindex, nofollow">
<title>お金のカルテ｜非上場企業オーナーのための経営・資産の診断ポータル</title>
<meta name="description" content="非上場企業オーナー・後継者のための、自社株評価をはじめとした経営・資産の無料診断ポータル。">
<link rel="canonical" href="https://okane-carte.jp/">
<style>
  :root{--navy:#12233d;--navy2:#1c3357;--gold:#a9843f;--ink:#1a2230;--muted:#5b6473;--line:#e4e2d8;
    --serif:"Yu Mincho","YuMincho","Hiragino Mincho ProN","Hiragino Mincho Pro",serif;
    --sans:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:#eef2f8;line-height:1.8;
    background:
      radial-gradient(1000px 480px at 80% -10%, rgba(169,132,63,.20), transparent 60%),
      linear-gradient(to bottom, transparent 27px, rgba(255,255,255,.03) 27px, rgba(255,255,255,.03) 28px),
      radial-gradient(120% 130% at 50% 0%, #1b3059, #0e1c31 62%);
    background-size:auto,100% 28px,auto;min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:760px;margin:0 auto;padding:0 22px;width:100%}
  header{padding:22px 0}
  .brand{display:flex;align-items:center;gap:12px;color:#fff;text-decoration:none}
  .emblem{width:40px;height:40px}
  .brand .mark{font-family:var(--serif);font-size:21px;letter-spacing:.08em}
  .brand .sub{font-size:11.5px;color:#c8d2e0;letter-spacing:.12em}
  main{flex:1;display:flex;align-items:center;padding:26px 0 60px}
  .eyebrow{color:#e6c983;font-size:12.5px;letter-spacing:.2em;font-weight:700;margin:0 0 16px;display:inline-flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:28px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
  h1{font-family:var(--serif);font-size:clamp(26px,5.6vw,40px);line-height:1.45;margin:0 0 18px;color:#fff;letter-spacing:.02em}
  h1 .g{background:linear-gradient(100deg,#e6c983,#b7935a 55%,#e6c983);-webkit-background-clip:text;background-clip:text;color:transparent}
  p.lead{color:#d6deec;font-size:16px;max-width:40em;margin:0 0 30px}
  .card{display:flex;align-items:center;gap:16px;text-decoration:none;color:#fff;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
    border:1px solid rgba(217,180,95,.34);border-radius:12px;padding:20px 22px;transition:border-color .15s,transform .12s}
  .card:hover{border-color:rgba(217,180,95,.7);transform:translateY(-1px)}
  .card .ic{width:46px;height:46px;flex:0 0 auto}
  .card .t{font-family:var(--serif);font-size:18px;margin:0 0 3px}
  .card .d{font-size:13px;color:#c3cede;margin:0}
  .card .arw{margin-left:auto;color:#e6c983;font-size:20px}
  .soon{margin:16px 0 0;font-size:12.5px;color:#93a1b8}
  .orn{display:flex;align-items:center;justify-content:center;gap:14px;margin:30px 0 22px;color:var(--gold)}
  .orn .ln{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
  .orn .ln.r{background:linear-gradient(90deg,var(--gold),transparent)}
  .orn svg{width:18px;height:18px}
  footer{padding:22px 0;font-size:12px;color:#8b99b0;border-top:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c983"/><stop offset=".5" stop-color="#b7935a"/><stop offset="1" stop-color="#8a6a2f"/>
    </linearGradient>
    <symbol id="emblem" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="47" fill="none" stroke="url(#g)" stroke-width="1.6"/>
      <circle cx="50" cy="50" r="41" fill="none" stroke="url(#g)" stroke-width="0.7"/>
      <circle cx="50" cy="7.6" r="2.4" fill="url(#g)"/>
      <polyline points="23,58 35,58 40,46 46,70 51,52 58,52 64,44 71,30" fill="none" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M66,30 71,30 71,35" fill="none" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="orn" viewBox="0 0 24 24">
      <rect x="7" y="7" width="10" height="10" transform="rotate(45 12 12)" fill="none" stroke="url(#g)" stroke-width="1.4"/>
      <circle cx="12" cy="12" r="1.6" fill="url(#g)"/>
    </symbol>
  </defs>
</svg>

<header>
  <div class="wrap">
    <a class="brand" href="/">
      <svg class="emblem" aria-hidden="true"><use href="#emblem"/></svg>
      <span><span class="mark">お金のカルテ</span><br><span class="sub">経営・資産 診断ポータル</span></span>
    </a>
  </div>
</header>

<main>
  <div class="wrap">
    <p class="eyebrow">非上場企業オーナー・後継者のために</p>
    <h1>会社の<span class="g">お金の健康</span>を、<br>数字で診る。</h1>
    <p class="lead">自社株の価値、事業承継、資産の組み替え——。オーナーだけが直面する問いに、まず「概算の目安」で答える無料診断シリーズです。</p>

    <a class="card" href="/jikabuka/">
      <svg class="ic" aria-hidden="true"><use href="#emblem"/></svg>
      <span>
        <p class="t">自社株評価シミュレーター</p>
        <p class="d">非上場株式の相続税評価額を、類似業種比準方式（簡易版）で概算する</p>
      </span>
      <span class="arw">→</span>
    </a>
    <p class="soon">※ 他の診断も順次公開予定です。</p>

    <div class="orn"><span class="ln"></span><svg aria-hidden="true"><use href="#orn"/></svg><span class="ln r"></span></div>
  </div>
</main>

<footer>
  <div class="wrap">© <span id="y"></span> お金のカルテ ／ 本サイトは概算の情報提供であり、税務・法務・投資助言ではありません。</div>
</footer>
<script>document.getElementById('y').textContent=String(new Date().getFullYear());
try{if(window.top!==window.self){window.top.location=window.self.location;}}catch(e){document.documentElement.style.display='none';}</script>
</body>
</html>
